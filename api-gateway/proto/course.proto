syntax = "proto3";

package pedagora;

// === MESSAGES ===

message Course {
  string id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  int32 duration_hours = 5;
  float price = 6;
  string created_at = 7;
}

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  string password = 4; // En clair pour l'instant
  string role = 5;      // student | instructor | admin
  string created_at = 6;
}

message Enrollment {
  string id = 1;
  string user_id = 2;
  string course_id = 3;
  string status = 4;    // active | completed | cancelled
  float progress = 5;   // 0.0 à 100.0
  string enrolled_at = 6;
}

// === REQUÊTES ===

message GetCourseRequest {
  string id = 1;
}

message GetCourseResponse {
  Course course = 1;
  bool found = 2;
}

message ListCoursesRequest {
  string category = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListCoursesResponse {
  repeated Course courses = 1;
  int32 total = 2;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string role = 4;
}

message CreateUserResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

message CreateEnrollmentRequest {
  string user_id = 1;
  string course_id = 2;
}

message CreateEnrollmentResponse {
  Enrollment enrollment = 1;
  bool success = 2;
  string message = 3;
}

message GetUserEnrollmentsRequest {
  string user_id = 1;
}

message GetUserEnrollmentsResponse {
  repeated Enrollment enrollments = 1;
  repeated Course courses = 2;
}

// === SERVICE ===

service CourseService {
  rpc GetCourse (GetCourseRequest) returns (GetCourseResponse);
  rpc ListCourses (ListCoursesRequest) returns (ListCoursesResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc CreateEnrollment (CreateEnrollmentRequest) returns (CreateEnrollmentResponse);
  rpc GetUserEnrollments (GetUserEnrollmentsRequest) returns (GetUserEnrollmentsResponse);
}